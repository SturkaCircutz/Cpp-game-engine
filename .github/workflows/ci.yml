name: ci

on:
  push:
    branches:
      - master
      - develop
      - "release/**"
      - "feature/**"
  pull_request:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ libglfw3-dev libglu1-mesa-dev mesa-common-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja

      - name: Build
        run: cmake --build build
